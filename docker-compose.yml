services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: advisor_db
      POSTGRES_USER: advisor_user
      POSTGRES_PASSWORD: advisor_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build: .
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - db
      - ollama

volumes:
  pgdata:
  ollama_data:
